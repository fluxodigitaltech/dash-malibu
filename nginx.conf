server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Resolver DNS público para proxy_pass dinâmico
    resolver 8.8.8.8 1.1.1.1 valid=30s ipv6=off;
    resolver_timeout 5s;

    # ── Proxy: Pacto API ──────────────────────────────────────────────────────
    location /api/pacto/ {
        set $pacto_host apigw.pactosolucoes.com.br;
        proxy_pass          https://$pacto_host/;
        proxy_ssl_server_name on;
        proxy_ssl_verify    off;
        proxy_set_header    Host              $pacto_host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    Accept-Encoding   "";
        proxy_connect_timeout 15s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
        proxy_buffer_size     128k;
        proxy_buffers         4 256k;
        proxy_busy_buffers_size 256k;
        # Repassa o body sem modificações (requests POST do Gympass etc)
        proxy_request_buffering on;
    }

    # ── Proxy: UazAPI ─────────────────────────────────────────────────────────
    location /api/uazapi/ {
        set $uazapi_host fluxodigitaltech.uazapi.com;
        proxy_pass          https://$uazapi_host/;
        proxy_ssl_server_name on;
        proxy_ssl_verify    off;
        proxy_set_header    Host            $uazapi_host;
        proxy_set_header    X-Real-IP       $remote_addr;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 15s;
        proxy_read_timeout    60s;
    }

    # ── Proxy: Sheety (Google Sheets) ─────────────────────────────────────────
    location /api/sheety/ {
        set $sheety_host api.sheety.co;
        proxy_pass          https://$sheety_host/;
        proxy_ssl_server_name on;
        proxy_ssl_verify    off;
        proxy_set_header    Host            $sheety_host;
        proxy_set_header    X-Real-IP       $remote_addr;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 15s;
        proxy_read_timeout    30s;
    }

    # ── SPA fallback ──────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Compressão ────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;
}
