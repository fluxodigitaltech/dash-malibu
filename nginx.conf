server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy: Pacto API
    location /api/pacto/ {
        proxy_pass https://apigw.pactosolucoes.com.br/;
        proxy_ssl_server_name on;
        proxy_set_header Host apigw.pactosolucoes.com.br;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Accept-Encoding "";
    }

    # Proxy: UazAPI
    location /api/uazapi/ {
        proxy_pass https://fluxodigitaltech.uazapi.com/;
        proxy_ssl_server_name on;
        proxy_set_header Host fluxodigitaltech.uazapi.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy: Sheety
    location /api/sheety/ {
        proxy_pass https://api.sheety.co/;
        proxy_ssl_server_name on;
        proxy_set_header Host api.sheety.co;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA fallback — todas as outras rotas vão pro index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}
